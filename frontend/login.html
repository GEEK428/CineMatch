<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CineMatch | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<header class="header" style="padding: 20px 0 0 0;">
  <h1 class="logo" style="font-size: 2.5rem;">Cine<span>Match</span></h1>
  <div class="page-info">
    <p>Welcome back! Securely sign in to access your recommendations.</p>
  </div>
</header>

<main class="page-wrapper">
  <div class="content-card">
    <section class="hero">
      <h2>Sign In</h2>
    </section>

    <form id="loginForm" class="input-section">
      <div class="input-group">
        <label for="email" class="label-required">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>

      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <label for="password" class="label-required">Password</label>
        </div>
        <div class="password-input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <a href="forgot-password.html" class="forgot-link" style="font-size: 0.8rem;">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" class="btn-primary">Login Now</button>

      <div class="divider">or continue with</div>

      <div class="social-login">
        <button type="button" class="btn-google" id="googleLogin">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24s8.955,20,20,20s20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Google Account
        </button>
      </div>
    </form>

    <div class="auth-footer" style="margin-top: 15px;">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</main>

<script src="js/notifications.js"></script>
<script src="js/auth.js"></script>
<script>
  const password = document.querySelector('#password');
  const toggle = document.querySelector('#togglePassword');

  toggle.addEventListener('click', function() {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    this.classList.toggle('fa-eye-slash');
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const passwordVal = password.value;
    
    try {
      const response = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: passwordVal })
      });
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('Welcome to CineMatch!', 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
      } else {
        showToast(data.message || 'Login failed', 'error');
      }
    } catch (err) {
      showToast('Error connecting to server', 'error');
    }
  });

  document.getElementById('googleLogin').addEventListener('click', () => {
    window.location.href = 'http://localhost:5000/api/auth/google';
  });
</script>

</body>
</html>
