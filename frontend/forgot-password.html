<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CineMatch | Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

<header class="header" style="padding: 20px 0 0 0;">
  <h1 class="logo" style="font-size: 2.5rem;">Cine<span>Match</span></h1>
  <div class="page-info">
    <p>Recover access to your profile securely.</p>
  </div>
</header>

<main class="page-wrapper">
  <div class="content-card">
    <section class="hero">
      <h2>Secure Reset</h2>
    </section>

    <form id="forgotForm" class="input-section">
      <div class="input-group">
        <label for="email" class="label-required">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" required>
      </div>

      <div class="input-group">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <label for="newPassword" class="label-required">New Password</label>
          <span class="label-hint">8+ chars, mixed case, number & special</span>
        </div>
        <div class="password-input-wrapper">
          <input type="password" id="newPassword" placeholder="••••••••" required>
          <i class="fas fa-eye password-toggle" id="toggleNewPassword"></i>
        </div>
        <div class="password-strength" id="strengthContainer">
          <div class="strength-bar" id="strengthBar"></div>
        </div>
      </div>

      <div class="input-group">
        <label for="confirmPassword" class="label-required">Confirm Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
          <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
        </div>
      </div>

      <button type="submit" class="btn-primary">Update Password</button>

      <div class="auth-footer" style="margin-top: 15px;">
        Remembered your password? <a href="login.html">Back to Sign in</a>
      </div>
    </form>
  </div>
</main>

<script src="js/notifications.js"></script>
<script>
  const newPass = document.querySelector('#newPassword');
  const strengthContainer = document.querySelector('#strengthContainer');
  const strengthBar = document.querySelector('#strengthBar');

  newPass.addEventListener('input', () => {
    const val = newPass.value;
    if (val.length === 0) { strengthContainer.style.display = 'none'; return; }
    strengthContainer.style.display = 'block';
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) strength++;
    if (/[0-9]/.test(val) && /[@$!%*?&]/.test(val)) strength++;
    strengthBar.className = 'strength-bar';
    if (strength === 1) strengthBar.classList.add('strength-weak');
    if (strength === 2) strengthBar.classList.add('strength-medium');
    if (strength === 3) strengthBar.classList.add('strength-strong');
  });

  function setupToggle(toggleId, inputId) {
    const toggle = document.querySelector(toggleId);
    const input = document.querySelector(inputId);
    toggle.addEventListener('click', () => {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      toggle.classList.toggle('fa-eye-slash');
    });
  }

  setupToggle('#toggleNewPassword', '#newPassword');
  setupToggle('#toggleConfirmPassword', '#confirmPassword');

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const newPassword = newPass.value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
      showToast('Passwords do not match!', 'error');
      return;
    }
    
    try {
      const response = await fetch('http://localhost:5000/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, newPassword, confirmPassword })
      });
      const data = await response.json();
      if (response.ok) {
        showToast('Password updated successfully!', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } else {
        const errorMsg = data.errors ? data.errors[0].msg : data.message;
        showToast(errorMsg || 'Update failed', 'error');
      }
    } catch (err) {
      showToast('Error connecting to server', 'error');
    }
  });
</script>

</body>
</html>
